<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rescue Wings</title>
  <style>
    body {
      margin: 0;
      font-family: Segoe UI, Arial, sans-serif;
      background: linear-gradient(135deg, #1f2937 0%, #7f1d1d 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      width: 420px;
      max-width: calc(100vw - 40px);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 16px;
      padding: 28px;
      box-sizing: border-box;
      backdrop-filter: blur(6px);
      text-align: center;
    }
    .logo {
      font-size: 44px;
      line-height: 1;
      margin-bottom: 12px;
    }
    .title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .subtitle {
      color: #fecaca;
      font-size: 13px;
      margin-bottom: 24px;
    }
    .bar {
      width: 100%;
      height: 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      overflow: hidden;
      margin-bottom: 12px;
    }
    .bar > div {
      height: 100%;
      width: 42%;
      border-radius: 999px;
      background: #ef4444;
      animation: slide 1.2s ease-in-out infinite;
    }
    .status {
      font-size: 12px;
      color: #fee2e2;
      letter-spacing: 0.04em;
    }
    @keyframes slide {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(260%); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🚁</div>
    <div class="title">RESCUE WINGS</div>
    <div class="subtitle">Starting local services...</div>
    <div class="bar"><div></div></div>
    <div class="status" id="status">Initializing offline database and backend</div>
  </div>
</body>
</html>
